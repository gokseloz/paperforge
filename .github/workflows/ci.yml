name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Render all examples
        run: npm test

      - name: Upload generated PDFs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: example-pdfs
          path: out/*.pdf
          if-no-files-found: warn
